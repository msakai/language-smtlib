name:                language-smtlib
version:             0.1.0.0
github:              "msakai/language-smtlib"
license:             BSD-3-Clause
author:              "Masahiro Sakai"
maintainer:          "masahiro.sakai@gmail.com"
copyright:           "2026 Masahiro Sakai"

extra-doc-files:
- README.md
- CHANGELOG.md
- conformance/README.md
- docs/extensions.md

extra-source-files:
- test/samples/smt/*.smt2

synopsis:            Parsing, printing and incremental I/O for the SMT-LIB 2 format
category:            Language, SMT

tested-with:
- GHC == 9.6.7
- GHC == 9.8.4
- GHC == 9.10.3
- GHC == 9.12.4

description: >-
  A @Text@-based library for parsing, printing, and incrementally streaming the
  SMT-LIB 2.7 format.


  It provides a parametric, fully-annotated AST in which every node carries an
  optional source-span annotation; a megaparsec-based parser with both
  whole-text and incremental (S-expression framing) entry points, suitable for
  solver pipes and REPLs; and a prettyprinter-based printer that guarantees
  @parse . render == id@ for well-formed trees.


  See the README at <https://github.com/msakai/language-smtlib#readme> for
  details and examples.

flags:
  tools:
    description: >-
      Build the developer-facing command-line tools shipped with this package:
      language-smtlib-fmt, a round-trip front end that parses an SMT-LIB script
      and re-emits it in canonical form; and language-smtlib-conformance, a
      driver that round-trips large external SMT-LIB benchmark suites (e.g. the
      SMT-LIB / SMT-COMP collections on Zenodo).  Off by default: these are
      development utilities, not needed by downstream packages that only depend
      on the library.
    manual: true
    default: false
  profiling:
    description: >-
      Add -fprof-auto (automatic cost centres) to this package's own components
      when building with profiling.  Off by default so that downstream packages
      profiling their own code are not cluttered with cost centres from
      language-smtlib.
    manual: true
    default: false

dependencies:
- base >= 4.7 && < 5

default-extensions:
- DeriveFoldable
- DeriveFunctor
- DeriveGeneric
- DeriveTraversable
- LambdaCase
- OverloadedStrings
- PatternSynonyms
- TupleSections

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - containers >= 0.6 && < 0.8
  - hashable >= 1.3 && < 1.6
  - megaparsec >= 9.0 && < 10
  - parser-combinators >= 1.0 && < 1.4
  - prettyprinter >= 1.7 && < 1.8
  - scientific >= 0.3 && < 0.4
  - text >= 1.2 && < 2.2
  when:
  - condition: flag(profiling)
    ghc-prof-options:
    - -fprof-auto

executables:
  language-smtlib-fmt:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    when:
    - condition: "!flag(tools)"
      buildable: false
    - condition: flag(profiling)
      ghc-prof-options:
      - -fprof-auto
    dependencies:
    - language-smtlib
    - text >= 1.2 && < 2.2

  language-smtlib-conformance:
    main:                Main.hs
    source-dirs:         conformance
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    when:
    - condition: "!flag(tools)"
      buildable: false
    - condition: flag(profiling)
      ghc-prof-options:
      - -fprof-auto
    dependencies:
    - language-smtlib
    - text >= 1.2 && < 2.2
    - directory >= 1.3 && < 1.4
    - filepath >= 1.4 && < 1.6

tests:
  language-smtlib-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - language-smtlib
    - QuickCheck
    - quickcheck-instances
    - tasty
    - tasty-hunit
    - tasty-quickcheck
    - text
    - containers
    - directory
    - filepath
    - hashable
    - megaparsec
    - unordered-containers
