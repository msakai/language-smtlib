name:                language-smtlib
version:             0.1.0.0
github:              "msakai/language-smtlib"
license:             BSD-3-Clause
author:              "Masahiro Sakai"
maintainer:          "masahiro.sakai@gmail.com"
copyright:           "2026 Masahiro Sakai"

extra-source-files:
- README.md
- CHANGELOG.md

synopsis:            Parsing, printing and incremental I/O for the SMT-LIB 2 format
category:            Language, SMT

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/msakai/language-smtlib#readme>

dependencies:
- base >= 4.7 && < 5

default-extensions:
- DeriveFoldable
- DeriveFunctor
- DeriveTraversable
- LambdaCase
- OverloadedStrings
- PatternSynonyms
- TupleSections

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - containers
  - megaparsec >= 9.0 && < 10
  - parser-combinators
  - prettyprinter >= 1.7
  - scientific
  - text

executables:
  language-smtlib-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - language-smtlib
    - text

tests:
  language-smtlib-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - language-smtlib
    - QuickCheck
    - quickcheck-instances
    - tasty
    - tasty-hunit
    - tasty-quickcheck
    - text
    - directory
    - filepath
    - megaparsec
